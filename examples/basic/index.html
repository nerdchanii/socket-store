<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>socket-store basic example</title>
    <style>
      :root {
        color: #172026;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: #f6f8fa;
      }

      main {
        box-sizing: border-box;
        margin: 0 auto;
        max-width: 760px;
        min-height: 100vh;
        padding: 48px 24px;
      }

      h1 {
        font-size: 32px;
        line-height: 1.1;
        margin: 0 0 8px;
      }

      p {
        color: #42515a;
        margin: 0 0 24px;
      }

      form {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
      }

      input {
        border: 1px solid #c6d1d9;
        border-radius: 6px;
        flex: 1;
        font: inherit;
        min-width: 0;
        padding: 10px 12px;
      }

      button {
        background: #155eef;
        border: 0;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        font: inherit;
        padding: 10px 16px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      ul {
        background: white;
        border: 1px solid #d8e0e6;
        border-radius: 8px;
        list-style: none;
        margin: 0;
        min-height: 160px;
        padding: 0;
      }

      li {
        border-bottom: 1px solid #edf1f4;
        padding: 12px 16px;
      }

      li:last-child {
        border-bottom: 0;
      }

      strong {
        color: #172026;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>socket-store basic example</h1>
      <p id="status">Connecting to ws://localhost:3030...</p>
      <form id="message-form">
        <input id="message-input" name="message" autocomplete="off" value="Hello from the browser" />
        <button id="send-button" type="submit" disabled>Send</button>
      </form>
      <ul id="messages"></ul>
    </main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
