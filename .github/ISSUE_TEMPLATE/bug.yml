name: Bug report
description: Report broken or unexpected socket-store behavior.
title: "[Bug]: "
labels: ["type:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest code or steps that reproduce the problem.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - Critical
        - P1 - High
        - P2 - Medium
        - P3 - Low
        - P4 - Backlog
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: socket-store@0.0.2
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Browser/runtime, TypeScript version, bundler, OS.
    validations:
      required: false

