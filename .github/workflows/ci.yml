name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Type-level tests
        run: npm run type-test

      - name: Runtime tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm run pack:dry-run
