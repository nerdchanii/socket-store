name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify release intent
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PR_BODY="$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER --jq .body)"
          export PR_BODY
          npm run release:intent -- --base ${{ github.event.pull_request.base.sha }} --head ${{ github.event.pull_request.head.sha }}

      - name: Typecheck
        run: npm run typecheck

      - name: Example typecheck
        run: npm run example:typecheck

      - name: Type-level tests
        run: npm run type-test

      - name: Runtime tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm run pack:dry-run
